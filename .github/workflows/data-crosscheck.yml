name: data-crosscheck

on:
  schedule:
    - cron: "0 3 * * 6"   # Saturday 03:00 UTC — weekly, after the week's ingests
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  crosscheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: pipeline
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7  # TODO: SHA-pin for supply-chain hardening
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Cross-check primary vs secondary NSE source
        id: crosscheck
        run: python -m pipeline cross-check
      - name: Alert on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          gh label create pipeline-failure --color B60205 --force >/dev/null 2>&1 || true
          body="Source cross-check FAILED on $(date -u +%F) — either a source divergence or a cross-check run failure (both sources must be investigated before trusting either). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          n=$(gh issue list --label pipeline-failure --state open --json number -q '.[0].number' || true)
          if [ -z "$n" ]; then
            gh issue create --title "Data pipeline: source cross-check failed" --label pipeline-failure --body "$body"
          else
            gh issue comment "$n" --body "$body"
          fi
