name: data-daily

on:
  schedule:
    # Retry ladder (PRD P0): fire early and keep re-trying until the day's NSE
    # bhavcopy lands, so a trader sees today's data by ~16:30 IST. Each fire runs
    # sync→daily→publish; the pipeline is idempotent + fail-closed, so an early
    # rung that hits `not_yet` no-ops and a later rung publishes once data lands.
    # Times are UTC (IST = UTC + 5:30).
    - cron: "45 10 * * 1-5"   # 16:15 IST — first attempt, shortly after close
    - cron: "15 11 * * 1-5"   # 16:45 IST
    - cron: "0 12 * * 1-5"    # 17:30 IST
    - cron: "30 13 * * 1-5"   # 19:00 IST
    - cron: "30 15 * * 1-5"   # 21:00 IST — final rung; alerts if still not landed
  workflow_dispatch:
    inputs:
      date:
        description: "Optional trading date YYYY-MM-DD to ingest (default: today)"
        required: false
        default: ""

permissions:
  contents: write   # gh needs release read+write
  issues: write     # failure alerting

concurrency:
  # Shared publish lock across every workflow that publishes to data-latest
  # (data-daily + fundamentals-daily): sync→publish must never interleave
  # across workflows — the CAS guard in publish.py is a backstop, not the
  # strategy.
  group: data-pipeline-publish
  cancel-in-progress: false   # never interrupt a publish mid-upload

jobs:
  ingest-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: pipeline
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -r requirements.lock -e . --no-deps
      - name: Sync baseline from the data-latest release (fail-closed)
        run: python -m pipeline sync
      - name: Ingest the trading day (today, or the dispatch date)
        env:
          DISPATCH_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$DISPATCH_DATE" ]; then
            python -m pipeline daily --date "$DISPATCH_DATE"
          else
            python -m pipeline daily
          fi
      - name: Decide whether to publish
        id: decide
        run: |
          status=$(jq -r '.status // "missing"' data/meta/last_run_status.json)
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "Ingest status: $status"
      - name: Publish the updated dataset
        # `success` = today's primary (OHLC) ingested fresh. `skipped_idempotent`
        # = OHLC already current, but a SECONDARY dataset (e.g. sector_industry,
        # rebuilt from its committed seed) may still have changed — publish those
        # too. Publish is diff-based against the release manifest, so a genuine
        # no-op uploads nothing. Only not_yet/failed/skipped_holiday skip publish.
        if: steps.decide.outputs.status == 'success' || steps.decide.outputs.status == 'skipped_idempotent'
        run: python -m pipeline publish
      - name: Surface window (catch-up) failures
        # G2 final-review fix (C1): a healthy TARGET day always publishes now
        # (cli.py's `daily` no longer exits 1 for a past-day-in-window
        # failure when the target itself is fine) -- so this step runs AFTER
        # publish has already completed, purely to surface the alert signal
        # cli.py persisted to data/meta/window_failures.json (primary or
        # secondary dataset, never uploaded as a publish artifact -- it's a
        # runner-local signal for this step only, see cli.py's own comment).
        # Reds the job (firing "Alert on failure" below) without having
        # blocked the publish that already ran.
        if: always() && steps.decide.outputs.status == 'success'
        run: |
          f=data/meta/window_failures.json
          [ -e "$f" ] || exit 0
          jq -c '.failures[]' "$f" | while read -r entry; do
            echo "::error::window failure: $entry"
          done
          exit 1
      - name: Surface secondary-dataset failures
        # Also on skipped_idempotent: that is exactly the day-type where a
        # secondary dataset (e.g. sector_industry) can have changed/failed while
        # OHLC is unchanged — the same day-type the publish gate now covers.
        if: always() && (steps.decide.outputs.status == 'success' || steps.decide.outputs.status == 'skipped_idempotent')
        run: |
          bad=0
          for f in data/meta/last_run_status_*.json; do
            [ -e "$f" ] || continue
            s=$(jq -r '.status // "missing"' "$f")
            case "$s" in success|skipped_holiday|skipped_idempotent|not_yet) ;; *)
              echo "::error::secondary dataset failed: $f status=$s"; bad=1 ;;
            esac
          done
          exit $bad
      - name: Alert if the bhavcopy never landed (final rung)
        # A `not_yet` status exits 0 (a missing bhavcopy is not a pipeline
        # failure), so an earlier rung that finds no data is a silent no-op — by
        # design, the next rung retries. But on the LAST rung (21:00 IST) a
        # still-`not_yet` target day means the bhavcopy won't publish today: the
        # dataset stays stale and nothing else would surface it. Raise the alert
        # here, reusing the shared `pipeline-failure` issue. Only fires on the
        # final scheduled rung (never on manual dispatch or the earlier rungs);
        # holidays / already-published days report a different status.
        if: github.event.schedule == '30 15 * * 1-5' && steps.decide.outputs.status == 'not_yet'
        working-directory: ${{ github.workspace }}
        run: |
          gh label create pipeline-failure --color B60205 --force >/dev/null 2>&1 || true
          body="data-daily: today's NSE bhavcopy never landed by the final retry (21:00 IST) on $(date -u +%F) — the dataset was NOT refreshed today. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          n=$(gh issue list --label pipeline-failure --state open --json number -q '.[0].number' || true)
          if [ -z "$n" ]; then
            gh issue create --title "Data pipeline: bhavcopy not published by 21:00 IST" --label pipeline-failure --body "$body"
          else
            gh issue comment "$n" --body "$body"
          fi
      - name: Alert on failure
        # `cancelled()` too: a job killed by `timeout-minutes` (e.g. a systemic
        # NSE/BSE outage that stalls the run) is marked cancelled, not failed —
        # `failure()` alone would let that time out silently with no alert.
        if: failure() || cancelled()
        working-directory: ${{ github.workspace }}
        run: |
          gh label create pipeline-failure --color B60205 --force >/dev/null 2>&1 || true
          body="data-daily FAILED on $(date -u +%F). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          n=$(gh issue list --label pipeline-failure --state open --json number -q '.[0].number' || true)
          if [ -z "$n" ]; then
            gh issue create --title "Data pipeline: data-daily failed" --label pipeline-failure --body "$body"
          else
            gh issue comment "$n" --body "$body"
          fi
