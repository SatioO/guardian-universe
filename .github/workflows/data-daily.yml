name: data-daily

on:
  schedule:
    - cron: "0 14 * * 1-5"   # 19:30 IST — shortly after NSE bhavcopy publishes
    - cron: "0 16 * * 1-5"   # 21:30 IST — late catch if the file published late
  workflow_dispatch:
    inputs:
      date:
        description: "Optional trading date YYYY-MM-DD to ingest (default: today)"
        required: false
        default: ""

permissions:
  contents: write   # gh needs release read+write
  issues: write     # failure alerting

concurrency:
  group: data-daily
  cancel-in-progress: false   # never interrupt a publish mid-upload

jobs:
  ingest-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: pipeline
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4   # pin to SHA in P2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Sync baseline from the data-latest release
        run: python -m pipeline sync
      - name: Ingest the trading day (today, or the dispatch date)
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m pipeline daily --date "${{ github.event.inputs.date }}"
          else
            python -m pipeline daily
          fi
      - name: Publish the updated dataset
        run: python -m pipeline publish
      - name: Alert on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          gh label create pipeline-failure --color B60205 --force >/dev/null 2>&1 || true
          body="data-daily FAILED on $(date -u +%F). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          n=$(gh issue list --label pipeline-failure --state open --json number -q '.[0].number' || true)
          if [ -z "$n" ]; then
            gh issue create --title "Data pipeline: data-daily failed" --label pipeline-failure --body "$body"
          else
            gh issue comment "$n" --body "$body"
          fi
